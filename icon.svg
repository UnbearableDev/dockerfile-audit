<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- dockerfile-audit: N1 highlighted (top-left), accent #06B6D4 (edge-active/cyan) -->
  <rect width="200" height="200" rx="31" fill="#0F172A"/>
  <!-- Edges: N2→N1 active cyan, rest inactive -->
  <line x1="100" y1="100" x2="56" y2="56" stroke="#06B6D4" stroke-width="6" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="144" y2="63" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="69" y2="150" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="150" y2="144" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <!-- N1 highlighted (56,56): r=16, cyan fill, ink inner ring -->
  <circle cx="56" cy="56" r="16" fill="#06B6D4"/>
  <circle cx="56" cy="56" r="7" fill="#0F172A"/>
  <!-- N2 center inactive -->
  <circle cx="100" cy="100" r="13" fill="#F8FAFC"/>
  <!-- N3 inactive -->
  <circle cx="144" cy="63" r="13" fill="#F8FAFC"/>
  <!-- N4 inactive -->
  <circle cx="69" cy="150" r="13" fill="#F8FAFC"/>
  <!-- N5 inactive -->
  <circle cx="150" cy="144" r="13" fill="#F8FAFC"/>
  <!-- Layer stack: three horizontal stacked bars top-right suggesting Dockerfile FROM/RUN layers -->
  <rect x="120" y="130" width="50" height="7" rx="2" fill="#06B6D4" opacity="0.55"/>
  <rect x="120" y="143" width="50" height="7" rx="2" fill="#06B6D4" opacity="0.35"/>
  <rect x="120" y="156" width="50" height="7" rx="2" fill="#06B6D4" opacity="0.2"/>
  <!-- Checkmark tick at far-right of top bar -->
  <polyline points="161,131 165,136 172,127" stroke="#06B6D4" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
